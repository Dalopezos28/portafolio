{% extends "base.html" %}

{% block title %}Projects{% endblock %}

{% block content %}
<section>
    <h1>Projects</h1>
    {% if projects %}
        <ul>
            {% for project in projects %}
                <li>{{ project.title }}</li>
            {% endfor %}
        </ul>
    {% else %}
        <p>No projects available yet.</p>
    {% endif %}
</section>
{% endblock %}
